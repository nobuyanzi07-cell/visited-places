<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visited Places</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
</body>
<h1>Visited Places</h1>

<section id="address-book">
    <h2>Address Book</h2>
    <input id="contact-name" placeholder="Name">
    <input id="contact-phone" placeholder="Phone">
    <input id="contact-email" placeholder="Email">
    <button id="add-contact">Add Contact</button>
    <ul id="contact-list"></ul>
</section>

<section id="places">
    <h2>Places you have been to</h2>
    <input id="place-location" placeholder="Location">
    <input id="place-labdmark" placeholder="Landmark">
    <button id="add-place">Add Place</button>
    <ul id="place-list"></ul>
</section>

<section id="todo">
    <h2>To Do List</h2>
    <input id="task-description" placeholder="Desc">
    <input id="task-due-date" placeholder="Due Date">
    <button id="add-task">Add Task</button>
    <ul id="task-list"></ul>
</section>

<script src="app.js"></script>

</body>

</html>
