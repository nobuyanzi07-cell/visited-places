<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visited Places js</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Visited Places js</h1>

  <section id="address-book">
    <h2>Address Book</h2>
    <input id="contact-name" placeholder="Name">
    <input id="contact-phone" placeholder="Phone">
    <input id="contact-email" placeholder="Email">
    <button id="add-contact">Add Contact</button>
    <ul id="contact-list"></ul>
  </section>

  <section id="places">
    <h2>Places You've Been</h2>
    <input id="place-location" placeholder="Location">
    <input id="place-landmarks" placeholder="Landmarks">
    <button id="add-place">Add Place</button>
    <ul id="place-list"></ul>
  </section>

  <section id="todo">
    <h2>To Do List</h2>
    <input id="task-desc" placeholder="Task description">
    <input id="task-due" placeholder="Due date">
    <button id="add-task">Add Task</button>
    <ul id="task-list"></ul>
  </section>

  <script src="app.js"></script>
  
</body>
</html>
